<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TIMEMARK PRICING</title>

<!-- ⭐ DÙNG CHUNG THEME APP -->

<link rel="stylesheet" href="theme-app.css?v=1">

<style>
/* ===== STYLE RIÊNG TRANG BUY (KHÔNG ẢNH HƯỞNG APP) ===== */

.header{text-align:center;padding:30px 10px;color:#fff;}

.container{
  max-width:900px;
  margin:auto;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  width:260px;
  border-radius:18px;
  padding:22px;
  backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  text-align:center;
  transition:.3s;
  color:#fff;
}

.card:hover{transform:translateY(-8px);}

.basic{border:2px solid #00e676;}
.pro{border:2px solid #00b0ff;}
.premium{border:2px solid #ff00ff;}

.price{
  font-size:18px;
  margin:10px 0;
  line-height:1.8;
}

.footer{
  text-align:center;
  margin-top:30px;
  opacity:.7;
  color:#fff;
}

/* POPUP QR */
#qrPopup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}

.qrBox{
background:#111;
padding:20px;
border-radius:14px;
text-align:center;
width:300px;
color:#fff;
}
</style>

</head>

<body>

<div id="qrPopup">
  <div class="qrBox">
    <h3>Quét QR để thanh toán</h3>
    <img id="qrImg" src="" style="width:220px;border-radius:10px;margin:12px 0;">
    <div id="loadingText">⏳ Đang chờ thanh toán...</div>
  </div>
</div>

<div class="header">
  <h1>🚀 TIMEMARK PREMIUM</h1>
  <p>Chọn gói bản quyền phù hợp</p>
</div>

<div class="container" id="pricing"></div>

<div class="footer">Mỗi key dùng cho 1 thiết bị</div>

<script>

/* =========================
   ⭐ CHỈ SỬA GIÁ Ở ĐÂY
========================= */
const priceMap = {
  basic1: 29000,
  basic7: 79000,
  pro1: 179000,
  pro3: 889000,
  pre6: 1339000,
  lifetime: 3499000
};

/* =========================
   ⭐ DATA PLAN
========================= */
const plans = [
 {id:"basic1", title:"⚡ 1 NGÀY (SALE)", cls:"basic"},
 {id:"basic7", title:"🌱 7 NGÀY (SALE)", cls:"basic"},
 {id:"pro1", title:"⭐ 1 THÁNG (SALE)", cls:"pro"},
 {id:"pro3", title:"🔥 3 THÁNG (SALE)", cls:"pro"},
 {id:"pre6", title:"🚀 6 THÁNG (SALE)", cls:"premium"},
 {id:"lifetime", title:"💎 VĨNH VIỄN (SALE)", cls:"premium"}
];

/* =========================
   ⭐ AUTO RENDER CARD + GIÁ
========================= */
const box = document.getElementById("pricing");

plans.forEach(p=>{

  const priceText = priceMap[p.id].toLocaleString("vi-VN")+"đ";

  box.innerHTML += `
    <div class="card ${p.cls}">
      <h3>${p.title}</h3>
      <div class="price">${priceText}</div>
      <button onclick="buy('${p.id}')">MUA NGAY</button>
    </div>
  `;
});

/* =========================
   ⭐ CHECK PAID REALTIME
========================= */
let checkTimer=null;

function startChecking(email){

  if(checkTimer) clearInterval(checkTimer);

  checkTimer=setInterval(()=>{

    fetch("https://script.google.com/macros/s/AKfycbwDRIc7_SZC2nx1TlYRU-taklWN57lDF9aXLHt2LE3MrLDEu-7Q0inQQlvYd6MKplhw9Q/exec",{
      method:"POST",
      body:JSON.stringify({action:"checkPaid",email})
    })
    .then(r=>r.json())
    .then(res=>{
      if(res.paid){
        clearInterval(checkTimer);
        document.getElementById("qrPopup").style.display="none";
        alert("🎉 Thanh toán thành công! KEY đã gửi về email.");
      }
    });

  },3000);
}

/* =========================
   ⭐ BUY
========================= */
function buy(plan){

  const email = prompt("Nhập Gmail để nhận KEY:");

  if(!email || !email.includes("@")){
    alert("Email không hợp lệ");
    return;
  }

  const price = priceMap[plan];
  const orderId = plan.toUpperCase();

  const qrLink =
  "https://img.vietqr.io/image/970448-CASS30102001-compact2.png?amount="
  +price+
  "&addInfo="+encodeURIComponent(orderId)+
  "&accountName="+encodeURIComponent("Nguyễn Vạn Nhỡ");

  document.getElementById("qrPopup").style.display="flex";
  document.getElementById("qrImg").src=qrLink;

  fetch("https://script.google.com/macros/s/AKfycbwDRIc7_SZC2nx1TlYRU-taklWN57lDF9aXLHt2LE3MrLDEu-7Q0inQQlvYd6MKplhw9Q/exec",{
    method:"POST",
    body:JSON.stringify({action:"createPending",email})
  }).then(()=>startChecking(email));
}

</script>

</body>
</html>
